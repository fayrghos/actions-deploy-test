name: Teste de Update
run-name: ${{ github.actor }} realizou um deploy

on:
  push:
    branches:
      - "master"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Running commands in the server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SV_IP }}
          username: ${{ secrets.SV_USER }}
          key: ${{ secrets.SV_KEY }}
          script: |
            set -e
            
            cd ${{ github.event.repository.name }}
            git pull
            
            tmux kill-server || true
            tmux new-session -d -s ${{ github.event.repository.name }} "uv run main.py"